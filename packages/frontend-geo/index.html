<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVE — Mapa de operaciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }
    #login-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #f5f5f5;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #login-overlay.visible { display: flex; }
    .login-card {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      width: 320px;
    }
    .login-card h2 { margin-bottom: 1.5rem; font-size: 1.2rem; color: #333; }
    .login-card input, .login-card button {
      width: 100%;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    .login-card button {
      background: #2c3e50;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .login-card button:hover { background: #34495e; }
    #login-error { color: #e74c3c; font-size: 0.85rem; min-height: 1.2em; }
    .zone-dialog::backdrop { background: rgba(0,0,0,0.4); }
    .zone-dialog {
      border: none;
      border-radius: 8px;
      padding: 1.5rem;
      width: 300px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .zone-dialog h3 { margin-bottom: 1rem; font-size: 1rem; }
    .zone-dialog label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #555; }
    .zone-dialog input, .zone-dialog select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .zone-dialog-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .zone-dialog-actions button {
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-confirm { background: #2ecc71; color: #fff; }
    .btn-cancel { background: #bdc3c7; color: #333; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="login-overlay">
    <div class="login-card">
      <h2>MOVE — Ingresar</h2>
      <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" />
      <button id="login-btn">Ingresar</button>
      <div id="login-error"></div>
    </div>
  </div>
  <dialog class="zone-dialog" id="zone-dialog">
    <h3 id="zone-dialog-title">Nueva zona</h3>
    <label for="zone-name">Nombre</label>
    <input type="text" id="zone-name" placeholder="Ej: Zona centro" />
    <label for="zone-type">Tipo</label>
    <select id="zone-type">
      <option value="PREFERRED">Preferida (verde)</option>
      <option value="RED">Prohibida (rojo)</option>
    </select>
    <div class="zone-dialog-actions">
      <button class="btn-cancel" id="zone-cancel">Cancelar</button>
      <button class="btn-confirm" id="zone-confirm">Crear</button>
    </div>
  </dialog>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
