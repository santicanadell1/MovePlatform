global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'booking-service'
    static_configs:
      - targets: ['booking-service:3001']
    metrics_path: /metrics

  - job_name: 'operations-service'
    static_configs:
      - targets: ['operations-service:3002']
    metrics_path: /metrics

  - job_name: 'tracking-service'
    static_configs:
      - targets: ['tracking-service:3003']
    metrics_path: /metrics
