upstream booking {
    server booking-service:3001;
}

upstream operations {
    server operations-service:3002;
}

upstream tracking {
    hash $http_x_device_id consistent;
    server tracking-service:3003;
}

server {
    listen 80;
    server_name _;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Headers comunes
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CORS
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials true always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── booking-service ────────────────────────────────────────────────────────
    location /v1/auth {
        proxy_pass http://booking;
    }

    location /v1/reservas {
        proxy_pass http://booking;
    }

    location /v1/companies {
        proxy_pass http://booking;
    }

    location /v1/admin {
        proxy_pass http://booking;
    }

    location /api/usuarios {
        proxy_pass http://booking;
    }

    location /api/empresas {
        proxy_pass http://booking;
    }

    location /api/reservas {
        proxy_pass http://booking;
    }

    location /api/admin/pricing {
        proxy_pass http://booking;
    }

    # ── operations-service ────────────────────────────────────────────────────
    location /api/operaciones {
        proxy_pass http://operations;
    }

    location /api/categorias {
        proxy_pass http://operations;
    }

    location /api/zonas {
        proxy_pass http://operations;
    }

    location /api/vehiculos {
        proxy_pass http://operations;
    }

    # ── tracking-service ──────────────────────────────────────────────────────
    location /api/tracking {
        proxy_pass http://tracking;
    }

    location /api/gps {
        proxy_pass http://tracking;
    }

    # SSE requiere buffering deshabilitado
    location /api/tracking/eventos {
        proxy_pass http://tracking;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # ── Health checks ─────────────────────────────────────────────────────────
    location /health/booking {
        proxy_pass http://booking/health;
    }

    location /health/operations {
        proxy_pass http://operations/health;
    }

    location /health/tracking {
        proxy_pass http://tracking/health;
    }
}
